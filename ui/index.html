    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />

    <meta name="keywords" content="IA, WhatsApp, prospection, clients, Afrique, business, agent IA, Baarali, automatisation, comptabilité, trading, marketing" />
    <meta name="robots" content="index, follow" />

    <link rel="canonical" href="https://baarali.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://baarali.com" />
    <meta property="og:title" content="Baarali — Ton équipe digitale qui travaille pendant que tu dors" />
    <meta property="og:description" content="Des agents IA spécialisés qui gèrent tes clients, ton stock et tes finances — 24h/24, en français et en langues locales." />
    <meta property="og:image" content="https://baarali.com/og-image.png" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Baarali" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://baarali.com" />
    <meta name="twitter:title" content="Baarali — Ton équipe digitale qui travaille pendant que tu dors" />
    <meta name="twitter:description" content="Des agents IA spécialisés qui gèrent tes clients, ton stock et tes finances — 24h/24." />
    <meta name="twitter:image" content="https://baarali.com/og-image.png" />

    <!-- Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Baarali" />
    <!-- BAARALI_RUNTIME_BRANDING_START -->
    <!-- BAARALI_RUNTIME_BRANDING_END -->
    <!-- BAARALI_FAVICON_START -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- BAARALI_FAVICON_END -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const key = "baarali.theme";
        const darkThemeColor = "#000000";
        const lightThemeColor = "#ffffff";
        try {
          const stored = window.localStorage.getItem(key);
          const theme = stored === "light" || stored === "dark" ? stored : "dark";
          const isDark = theme === "dark";
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute("content", isDark ? darkThemeColor : lightThemeColor);
          }
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body class="overflow-y-auto">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
